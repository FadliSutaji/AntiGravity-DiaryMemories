<!DOCTYPE html>
<html lang="id" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💌 Date Invitation — Kamu Diundang!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Invitation page specific */
        .invite-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            background:
                radial-gradient(ellipse at 30% 20%, rgba(236, 72, 153, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(168, 85, 247, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(124, 58, 237, 0.06) 0%, transparent 60%),
                var(--bg-primary);
        }

        .invite-page-content {
            max-width: 500px;
            width: 100%;
            animation: fadeInUp 1s ease-out;
        }

        .invite-back {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            transition: var(--transition);
            padding: 0.4rem 0.8rem;
            border-radius: var(--radius-sm);
        }

        .invite-back:hover {
            color: var(--accent-light);
            background: rgba(168, 85, 247, 0.1);
        }

        .invite-page-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .invite-page-tag {
            display: inline-block;
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent-light);
            background: rgba(168, 85, 247, 0.1);
            padding: 0.4rem 1.2rem;
            border-radius: var(--radius-xl);
            border: 1px solid var(--border-glass);
            margin-bottom: 1rem;
        }

        .invite-page-title {
            font-family: var(--font-display);
            font-size: 2.5rem;
            font-weight: 600;
        }

        .invite-page-title .accent {
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .invite-page-desc {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-top: 0.5rem;
        }

        .invite-hearts {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .floating-heart {
            position: absolute;
            font-size: 1.2rem;
            opacity: 0;
            animation: heartFloat linear infinite;
        }

        @keyframes heartFloat {
            0% { opacity: 0; transform: translateY(100vh) rotate(0deg) scale(0.5); }
            10% { opacity: 0.4; }
            90% { opacity: 0.1; }
            100% { opacity: 0; transform: translateY(-10vh) rotate(360deg) scale(1); }
        }

        @media (max-width: 480px) {
            .invite-page-title { font-size: 2rem; }
        }
    </style>
</head>

<body>
    <!-- Floating hearts -->
    <div class="invite-hearts" id="inviteHearts"></div>

    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <div class="invite-page">
        <div class="invite-page-content" style="position: relative; z-index: 2;">

            <a href="index.html" class="invite-back">← Kembali ke Diary</a>

            <div class="invite-page-header">
                <span class="invite-page-tag">💌 You're Invited</span>
                <h1 class="invite-page-title">Date <span class="accent">Invitation</span></h1>
                <p class="invite-page-desc">Sebuah undangan spesial buat kamu 💜</p>
            </div>

            <div class="invitation-card glass-card cute-card">
                <div class="cute-sticker cute-sticker-1">💌</div>
                <div class="cute-sticker cute-sticker-2">🌸</div>

                <div class="invite-header">
                    <div class="invite-envelope">💌</div>
                    <h3 class="invite-title">Kamu diundang untuk...</h3>
                    <p class="invite-subtitle">hangout bareng akuuu 💜</p>
                </div>

                <div class="invite-details">
                    <div class="invite-detail-item">
                        <div class="invite-icon">📅</div>
                        <div class="invite-info">
                            <span class="invite-label">Tanggal</span>
                            <span class="invite-value" id="inviteDate">Belum dipilih</span>
                        </div>
                    </div>

                    <div class="invite-detail-item">
                        <div class="invite-icon">📍</div>
                        <div class="invite-info">
                            <span class="invite-label">Tempat</span>
                            <span class="invite-value">Rahasia, nanti aku kasih tau 🤫</span>
                        </div>
                    </div>

                    <div class="invite-detail-item">
                        <div class="invite-icon">👗</div>
                        <div class="invite-info">
                            <span class="invite-label">Dresscode</span>
                            <span class="invite-value">Yang penting cantik kayak biasa 💅</span>
                        </div>
                    </div>
                </div>

                <div class="invite-rsvp">
                    <p class="rsvp-question">Bisa dateng kan? 🥺</p>
                    <div class="rsvp-buttons">
                        <button class="btn btn-primary btn-glow" onclick="rsvpAnswer('yes')">
                            Iya dong! 💜
                        </button>
                        <button class="btn btn-secondary" onclick="rsvpAnswer('no')">
                            Hmm gatau 😢
                        </button>
                    </div>
                    <p class="rsvp-status" id="rsvpStatus"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- RSVP Popup -->
    <div class="pick-popup-overlay" id="rsvpPopup">
        <div class="pick-popup-card glass-card">
            <div class="pick-popup-emoji" id="rsvpEmoji">💜</div>
            <h3 class="pick-popup-title" id="rsvpTitle"></h3>
            <p class="pick-popup-msg" id="rsvpMsg"></p>
            <button class="btn btn-primary btn-sm" onclick="closeRsvpPopup()">Oke beb 💜</button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // Theme
        const saved = localStorage.getItem('diary_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', saved);

        // Particles
        const pc = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 4 + 1;
            const colors = ['#a855f7', '#c084fc', '#ec4899', '#f472b6', '#818cf8'];
            p.style.cssText = `left:${Math.random()*100}%;width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${Math.random()*15+10}s;animation-delay:${Math.random()*10}s;`;
            pc.appendChild(p);
        }

        // Floating hearts
        const hc = document.getElementById('inviteHearts');
        const hearts = ['💜', '💕', '💗', '🩷', '✨', '🌸'];
        for (let i = 0; i < 15; i++) {
            const h = document.createElement('div');
            h.className = 'floating-heart';
            h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
            h.style.cssText = `left:${Math.random()*100}%;font-size:${Math.random()*1.5+0.8}rem;animation-duration:${Math.random()*12+8}s;animation-delay:${Math.random()*8}s;`;
            hc.appendChild(h);
        }

        // Load saved date
        const datePick = localStorage.getItem('diary_date_pick');
        if (datePick) {
            document.getElementById('inviteDate').textContent = `Tanggal ${datePick} bulan ini 💜`;
        }

        // Load saved RSVP
        const rsvpSaved = localStorage.getItem('diary_rsvp');
        if (rsvpSaved) {
            document.getElementById('rsvpStatus').textContent = rsvpSaved === 'yes'
                ? 'Kamu udah confirm dateng! 💜 See you beb!'
                : 'Yaudah gapapa, tapi aku tetep nunggu ya 🥺';
        }

        // RSVP
        function rsvpAnswer(answer) {
            localStorage.setItem('diary_rsvp', answer);
            const popup = document.getElementById('rsvpPopup');
            const emoji = document.getElementById('rsvpEmoji');
            const title = document.getElementById('rsvpTitle');
            const msg = document.getElementById('rsvpMsg');
            const status = document.getElementById('rsvpStatus');

            if (answer === 'yes') {
                emoji.textContent = '🥰';
                title.textContent = 'Yeay! Makasih beb!';
                msg.textContent = 'Aku udah ga sabar ketemu kamu! Siap-siap ya 💜';
                status.textContent = 'Kamu udah confirm dateng! 💜 See you beb!';
            } else {
                emoji.textContent = '🥺';
                title.textContent = 'Yahhh...';
                msg.textContent = 'Gapapa beb, tapi aku tetep nunggu kamu ya... 🥺💜';
                status.textContent = 'Yaudah gapapa, tapi aku tetep nunggu ya 🥺';
            }
            popup.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeRsvpPopup() {
            document.getElementById('rsvpPopup').classList.remove('active');
            document.body.style.overflow = '';
        }
    </script>
</body>

</html>
